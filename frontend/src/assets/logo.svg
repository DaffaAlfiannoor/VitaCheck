<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="VitaCheck Logo">
  <defs>
    <!-- Gradient untuk ikon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Gradient untuk pulse line -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <!-- Glow untuk pulse -->
    <filter id="glowPulse">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== IKON SHIELD + PULSE ===== -->
  <path
    d="M28 6 L10 13 L10 28 C10 38.5 18 46.5 28 50 C38 46.5 46 38.5 46 28 L46 13 Z"
    fill="url(#iconGrad)"
    filter="url(#iconShadow)"
  />
  <!-- Shield inner highlight -->
  <path
    d="M28 8 L12 14.5 L12 28 C12 37.8 19.5 45.2 28 48.2"
    stroke="white"
    stroke-width="0.5"
    stroke-opacity="0.25"
    fill="none"
  />

  <!-- ECG / Pulse line di dalam shield -->
  <polyline
    points="14,28 19,28 21.5,20 24.5,36 27,24 29.5,32 32,28 37,28 39,23 41,28 42,28"
    stroke="url(#pulseGrad)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glowPulse)"
  />

  <!-- Dot di puncak pulse -->
  <circle cx="27" cy="24" r="1.8" fill="white" opacity="0.9"/>

  <!-- ===== TEKS ===== -->
  <text
    x="54"
    y="36"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#1e1b4b"
  >Vita</text>

  <text
    x="100"
    y="36"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#6366f1"
  >Check</text>

  <!-- Tagline -->
  <text
    x="54"
    y="47"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    font-weight="400"
    letter-spacing="1.5"
    fill="#94a3b8"
  >HEALTH RISK PREDICTION</text>
</svg>
